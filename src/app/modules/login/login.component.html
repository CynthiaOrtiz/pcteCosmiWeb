<div class="login-wrapper">
  <div class="login-container">
    <div class="login-header">
      <img src="/assets/images/Logo.png" alt="Logo Consultorio" class="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/2966/2966327.png'">
      <h1>Bienvenida</h1>
      <p>Paz, Salud y Bienestar en cada detalle</p>
    </div>
    
    <form (ngSubmit)="onLogin()" #f="ngForm" class="login-form">
      <div class="form-group">
        <label for="nombreUsuario">Usuario</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="nombreUsuario" name="nombreUsuario" [(ngModel)]="nombreUsuario" required autocomplete="off" placeholder="Tu usuario">
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" name="password" [(ngModel)]="password" required autocomplete="off" placeholder="Tu contraseña">
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="!f.valid">
        Ingresar <i class="fas fa-heart"></i>
      </button>
    </form>
  </div>
</div>
