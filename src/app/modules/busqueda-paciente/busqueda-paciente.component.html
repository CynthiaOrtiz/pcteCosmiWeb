<div class="busqueda-paciente-container">
  <div class="buttonhom">
    <button type="button" (click)="home()" style="text-align: center;"> <i class="fas fa-home"></i> </button>
  </div>
  <button type="button" (click)="nuevoPaciente()"><i class="fas fa-user-plus"></i> Crear Paciente</button>
  <button (click)="regresar()">
    <span class="fas fa-arrow-left"></span> Atras
  </button>
  <h2>Lista de Pacientes</h2>
  <div class="filtro-container">
    <input type="text" placeholder="Buscar por cédula, nombre o apellido" [(ngModel)]="filtro"
      (input)="filtrarPacientes()" class="input-filtro" />
  </div>
  <ul>
    <li *ngFor="let paciente of pacientesFiltrados" (click)="seleccionarPaciente(paciente)">

      <div class="column-count: 5; column-gap: 20px; ">
        {{ paciente.cedula }} - {{ paciente.nomCom }}
        <button (click)="verHistoriaClinica(paciente)" title="Historia Clínica">
          <i class="fas fa-file-medical"></i>
        </button>
        <button (click)="nuevoTratamiento(paciente)" title="Nuevo Tratamiento">
          <i class="fas fa-plus-circle"></i>
        </button>
        <button (click)="verTratamientos(paciente)" title="Tratamientos">
          <i class="fas fa-list"></i>
        </button>
        <button (click)="abrirModalEliminar(paciente, confirmDeleteModal)" title="Eliminar">
          <i class="fas fa-trash"></i>
        </button>
      </div>

    </li>
    <li *ngIf="pacientesFiltrados.length === 0">
      <td colspan="3" class="sin-resultados">No se encontraron resultados</td>
    </li>
    <button (click)="regresar()">
      <span class="fas fa-arrow-left"></span> Atras
    </button>
  </ul>

  <div *ngIf="selectedPaciente" class="editar-paciente">
    <h2>Editar Paciente</h2>
    <form [formGroup]="pacienteForm" (ngSubmit)="guardarCambios()">
      <div>
        <label for="nombre">Nombre:</label>
        <input id="nombre" formControlName="nombre" type="text" (input)="llenarNomCom()">
      </div>
      <div>
        <label for="apellido">Apellido:</label>
        <input id="apellido" formControlName="apellido" type="text" (input)="llenarNomCom()">
      </div>
      <div>
        <label for="nombre_completo">Nombre Completo:</label>
        <input id="nombre_completo" formControlName="nomCom" type="text" readonly>
      </div>
      <div>
        <label for="cedula">Cédula:</label>
        <input id="cedula" formControlName="cedula" type="text" readonly>
      </div>
      <div>
        <label for="pasaporte">Pasaporte:</label>
        <input id="pasaporte" formControlName="pasaporte" type="text" readonly>
      </div>
      <div>
        <label for="direccion">Dirección:</label>
        <input id="direccion" formControlName="direccion" type="text">
      </div>
      <div>
        <label for="telefono">Teléfono:</label>
        <input id="telefono" formControlName="telefono" type="number">
      </div>
      <div>
        <label for="ocupacion">Ocupación:</label>
        <input id="ocupacion" formControlName="ocupacion" type="text">
      </div>
      <div>
        <label for="genero">Género:</label>
        <select id="genero" formControlName="genero">
          <option value="masculino">Masculino</option>
          <option value="femenino">Femenino</option>
        </select>
      </div>
      <div>
        <label for="email">Email:</label>
        <input id="email" formControlName="email" type="email">
      </div>
      <div>
        <label for="nacimiento">Fecha de Nacimiento:</label>
        <input id="nacimiento" formControlName="nacimiento" type="date">
      </div>
      <button type="submit">Guardar Cambios</button>
      <button type="button" (click)="cancelarEdicion()">Cancelar</button>
    </form>
  </div>

  <ng-template #confirmDeleteModal let-modal>
    <div class="modal-header" style="background-color: #ff69b4; color: white; padding: 0.5rem 1rem;">
      <h4 class="modal-title" id="modal-title" style="font-size: 1.2rem;" style="margin:0 0 0px;">Confirmar Eliminación
      </h4>
      <button type="button" class="btn-close btn-close-white" style="font-size: 0.75rem;" aria-label="Close button"
        aria-describedby="modal-title" (click)="modal.dismiss('Cross click')"></button>
    </div>
    <div class="modal-body" style="background-color: #e0e0e0; color: #333;">
      <p style="margin-bottom: 0;">¿Estás seguro de que deseas eliminar al paciente <strong style="color: black;">{{
          pacienteAEliminar?.nomCom }}</strong>?</p>
    </div>
    <div class="modal-footer" style="background-color: #e0e0e0; border-top: 1px solid #c0c0c0;">
      <button type="button" class="btn btn-outline-secondary" (click)="modal.dismiss('cancel')"
        style="background-color: white; color: #333;">Cancelar</button>
      <button type="button" class="btn btn-danger" (click)="modal.close('Ok')">Eliminar</button>
    </div>
  </ng-template>
</div>
